<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 10px;
            margin: 0;
            background-color: rgb(27, 46, 46);
        }
        h1 {
            margin: 10px 0;
            font-size: 24px;
            color: rgb(124, 235, 61);
        }
        #canvas {
            border: 2px solid #000;
            background-color: white;
            cursor: crosshair;
            max-width: 100vw;
            max-height: 70vh;
            display: block;
        }
        .controls {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            height: 100px;
            align-items: center;
            justify-content: center;
            color: black;
        }
        .control-group label {
            font-weight: bold;
            font-size: 14px;
            min-width: 70px;
            color: rgb(127, 182, 245);
        }
        .color-btn {
            width: 10px;
            height: 40px;
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 50%;
            color: black;
            
        }
        .size-btn {
            padding: 8px 12px;
            cursor: pointer;
            background-color: #ddd;
            color: black;
            border: 1px solid #000;
            border-radius: 4px;
            font-size: 14px;
            touch-action: manipulation;
        }
        button {
            padding: 12px 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            touch-action: manipulation;
            min-width: 80px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:active {
            background-color: #3d8b40;
        }
        #color-picker {
            width: 40px;
            height: 40px;
            cursor: pointer;
        }
        
        .toolbar {
            position: fixed;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            background-color: rgba(5, 5, 5, 0.95);
            padding: 8px;
            border-radius: 8px;
            border: 2px solid #4CAF50;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .toolbar button {
            padding: 10px 14px;
            font-size: 13px;
            min-width: auto;
            background-color: #4CAF50;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            h1 {
                font-size: 20px;
                margin: 5px 0;
            }
            #canvas {
                max-height: 50vh;
                border: 2px solid #000;
                max-width: 100vw;
            }
            .controls {
                margin: 10px 0;
                gap: 8px;
            }
            .control-group {
                width: 100%;
                margin-bottom: 5px;
                gap: 5px;
            }
            .control-group label {
                font-size: 12px;
                min-width: 60px;
            }
            .color-btn {
                width: 35px;
                height: 35px;
            }
            .size-btn {
                padding: 7px 10px;
                font-size: 12px;
            }
            button {
                padding: 10px 12px;
                font-size: 12px;
                min-width: 70px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
                padding-top: 70px;
            }
            h1 {
                font-size: 18px;
            }
            #canvas {
                max-height: 40vh;
                max-width: 100%;
            }
            .controls {
                gap: 5px;
                margin: 5px 0;
            }
            .control-group {
                width: 100%;
                margin-bottom: 8px;
                gap: 5px;
                justify-content: flex-start;
            }
            .control-group label {
                font-size: 11px;
                min-width: 50px;
            }
            .color-btn {
                width: 32px;
                height: 32px;
            }
            .size-btn {
                padding: 6px 8px;
                font-size: 11px;
            }
            button {
                padding: 8px 10px;
                font-size: 11px;
                min-width: 60px;
            }
            #color-picker {
                width: 32px;
                height: 32px;
            }
            .toolbar {
                top: 5px;
                left: 5px;
                flex-direction: row;
                gap: 4px;
                padding: 5px;
            }
            .toolbar button {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <h1>Drawing App</h1>
    
    <div class="toolbar">
        <button onclick="undo()">↶ Undo</button>
        <button onclick="redo()">↷ Redo</button>
        <button onclick="saveImage()">💾 Save</button>
    </div>
    
    <canvas id="canvas" width="100%" height="600"></canvas>
    <div class="controls">
        <div class="control-group">
            <label>Colors:</label>
            <button class="color-btn" style="background-color: black;" onclick="setColor('black')"></button>
            <button class="color-btn" style="background-color: red;" onclick="setColor('red')"></button>
            <button class="color-btn" style="background-color: blue;" onclick="setColor('blue')"></button>
            <button class="color-btn" style="background-color: green;" onclick="setColor('green')"></button>
            <button class="color-btn" style="background-color: yellow;" onclick="setColor('yellow')"></button>
            <input type="color" id="color-picker" onchange="setColor(this.value)">
        </div>
        <div class="control-group">
            <label>Brush Size:</label>
            <button class="size-btn" onclick="setSize(2)">Small</button>
            <button class="size-btn" onclick="setSize(5)">Medium</button>
            <button class="size-btn" onclick="setSize(10)">Large</button>
            <button class="size-btn" onclick="setSize(20)">X Large</button>
        </div>
        <div class="control-group">
            <label>Brush Shape:</label>
            <button class="size-btn" onclick="setShape('round')">Round</button>
            <button class="size-btn" onclick="setShape('square')">Square</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Make canvas responsive
        function resizeCanvas() {
            const maxWidth = window.innerWidth * 0.9;
            const maxHeight = window.innerHeight * 0.9;
            const ratio = 4 / 3;
            
            let width = maxWidth;
            let height = width / ratio;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * ratio;
            }
            
            canvas.width = width;
            canvas.height = height;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let drawing = false;
        let currentColor = 'black';
        let currentSize = 5;
        let currentShape = 'round';
        let history = [];
        let historyStep = -1;

        // Save initial state
        saveState();

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events for mobile
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            startDrawing({ clientX: touch.clientX - rect.left, clientY: touch.clientY - rect.top });
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            draw({ clientX: touch.clientX - rect.left, clientY: touch.clientY - rect.top });
        });
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            drawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        }

        function draw(e) {
            if (!drawing) return;
            ctx.lineWidth = currentSize;
            ctx.lineCap = currentShape;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
            ctx.stroke();
        }

        function stopDrawing() {
            if (drawing) {
                drawing = false;
                saveState();
            }
        }

        function setColor(color) {
            currentColor = color;
        }

        function setSize(size) {
            currentSize = size;
        }

        function setShape(shape) {
            currentShape = shape;
        }

        function saveState() {
            history = history.slice(0, historyStep + 1);
            history.push(canvas.toDataURL());
            historyStep++;
            if (history.length > 50) {
                history.shift();
                historyStep--;
            }
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreState();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreState();
            }
        }

        function restoreState() {
            const img = new Image();
            img.src = history[historyStep];
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function shareImage() {
            const dataUrl = canvas.toDataURL();
            if (navigator.share) {
                fetch(dataUrl)
                    .then(res => res.blob())
                    .then(blob => {
                        const file = new File([blob], 'drawing.png', { type: 'image/png' });
                        navigator.share({
                            title: 'My Drawing',
                            files: [file]
                        });
                    });
            } else {
                // Fallback: copy data URL to clipboard or alert
                navigator.clipboard.writeText(dataUrl).then(() => {
                    alert('Image data copied to clipboard. You can paste it in an image editor.');
                });
            }
        }
    </script>
</body>
</html>
